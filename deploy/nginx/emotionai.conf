# EmotionAI Nginx reverse proxy
# HTTP -> HTTPS redirect and TLS termination with self-signed certificate

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP to HTTPS, preserving path and query
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # TLS certs generated by scripts/gen_self_signed_ip_cert.sh
    ssl_certificate /etc/nginx/ssl/emotionai.crt;
    ssl_certificate_key /etc/nginx/ssl/emotionai.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 16m;

    # Health endpoint is passed through directly
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Default proxy to FastAPI on localhost:8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

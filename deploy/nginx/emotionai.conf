# EmotionAI Nginx reverse proxy
# HTTP -> HTTPS redirect and TLS termination with self-signed certificate

server {
    listen 80; # IPv4
    listen [::]:80; # IPv6
    server_name emotionai.duckdns.org;

    # Redirect all HTTP to HTTPS, preserving path and query
    return 301 https://$host$request_uri;
}

# gzip on;
# gzip_types application/json text/plain application/javascript text/css;

# Upgrade helper for WebSockets
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name emotionai.duckdns.org;

    # >>> Certs de Let's Encrypt (NO els self-signed)
    ssl_certificate     /etc/letsencrypt/live/emotionai.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emotionai.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 16m;

    # Health endpoint is passed through directly
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Default proxy to FastAPI on localhost:8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Authorization      $http_authorization;
        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Websocket endpoint is passed through directly
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Authorization      $http_authorization;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location ~* \.(php|phar)$ { return 444; }
    location = /.env { return 404; }
}
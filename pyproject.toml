[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "migrations/*",
    "tests/*",
    "**/__pycache__/*",
    "src/infrastructure/config/settings.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false

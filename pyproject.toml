[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "migrations/*",
    "tests/*",
    "**/__pycache__/*",
    "src/infrastructure/config/settings.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "@(abc\\.)?abstractmethod",
    "if not hasattr\\(self",       # unreachable __post_init__ guard on frozen dataclasses
    "object\\.\\__setattr__",      # frozen dataclass attribute setting in __post_init__
    "import uuid",                 # inline imports inside __post_init__
]

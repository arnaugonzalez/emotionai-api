version: '3.9'

services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=emotionai
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=emotionai_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emotionai -d emotionai_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - emotionai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - emotionai-network

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # Make accessible from network
    environment:
      - DATABASE_URL=postgresql://emotionai:password123@db:5432/emotionai_db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=dev-secret-key-change-in-production-2024
      - ENVIRONMENT=development
      - DEBUG=true
      - CORS_ORIGINS=["*"]
      - OPENAI_API_KEY=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
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app  # For development hot reloading
    networks:
      - emotionai-network

networks:
  emotionai-network:
    driver: bridge

volumes:
  postgres_data:

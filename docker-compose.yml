services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=emotionai
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=emotionai_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - emotionai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - emotionai-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://emotionai:password123@db:5432/emotionai_db
      - DB_SSL_ROOT_CERT=
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - DEBUG=true
      - CORS_ORIGINS=["*"]
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - emotionai-network

  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - emotionai-network
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    networks:
      - emotionai-network
    depends_on:
      - prometheus

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.infrastructure.tasks.worker worker --loglevel=info -E --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://emotionai:password123@db:5432/emotionai_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - emotionai-network

  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    environment:
      - FLOWER_UNAUTHENTICATED_API=true
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    networks:
      - emotionai-network

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"   # Jaeger UI — browse traces at http://localhost:16686
      - "4318:4318"     # OTLP HTTP receiver — API sends spans here
    environment:
      - COLLECTOR_OTLP_ENABLED=true   # Defensive: default in Jaeger 1.35+, kept for compatibility
    networks:
      - emotionai-network

networks:
  emotionai-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
